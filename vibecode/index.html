<!DOCTYPE html>
<html lang="ko">
<head>
  <!--
    [index.html] - 화면 구조를 담당하는 파일
    HTML은 웹페이지의 '뼈대'를 만듭니다.
    눈에 보이는 모든 요소(제목, 카드, 버튼 등)가 여기에 있어요.
  -->

  <!-- 한글이 깨지지 않도록 UTF-8 인코딩 설정 -->
  <meta charset="UTF-8" />

  <!-- 모바일(스마트폰)에서도 화면이 잘 보이도록 설정 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- 브라우저 탭에 표시되는 제목 -->
  <title>👀 눈 휴식 미션 앱</title>

  <!-- Google Fonts: 한글 폰트 불러오기 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- [연결] style.css 파일을 불러옵니다 (디자인 담당) -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- 앱 전체를 감싸는 큰 박스 -->
  <div class="container">

    <!-- ① 제목 영역 -->
    <header>
      <div class="emoji-big">👁️</div>
      <h1>👀 눈 휴식 미션 앱</h1>
      <p class="subtitle">공부하다 잠깐, 눈도 쉬게 해줘요!</p>
    </header>

    <!-- ② 완료 횟수 카드 -->
    <div class="card count-card">
      <!-- id="count"를 JavaScript에서 찾아서 숫자를 바꿉니다 -->
      <span class="count-label">오늘 완료한 미션</span>
      <span class="count-num" id="count">0</span>
      <span class="count-label">회</span>
    </div>

    <!-- ③ 미션 카드 -->
    <div class="card mission-card">

      <!-- 미션을 받기 전에 보이는 안내 문구 -->
      <!-- id="before"를 JavaScript로 숨기고 나타냅니다 -->
      <div id="before">
        <div class="mission-icon">🎯</div>
        <p class="guide-text">아래 버튼을 눌러 미션을 받아보세요!</p>
      </div>

      <!-- 미션을 받은 후에 보이는 내용 (처음에는 숨겨둠) -->
      <!-- class="hidden"이 있으면 보이지 않습니다 -->
      <div id="after" class="hidden">
        <p class="mission-badge" id="mission-num">MISSION 1</p>
        <p class="mission-text" id="mission-text"></p>
      </div>

    </div>

    <!-- ④ 버튼 영역 -->
    <div class="btn-group">

      <!-- 새 미션 받기 버튼: 클릭하면 script.js의 newMission() 함수 실행 -->
      <button class="btn btn-blue" onclick="newMission()">
        🎲 새 미션 받기
      </button>

      <!-- 완료 버튼: 처음에는 숨겨두고, 미션이 나타날 때 같이 보여줌 -->
      <button class="btn btn-green hidden" id="done-btn" onclick="doneMission()">
        ✅ 미션 완료!
      </button>

    </div>

    <!-- ⑤ 하단 안내 문구 -->
    <footer>
      <p class="disclaimer">이 앱은 생활습관 참고용입니다.</p>
    </footer>

  </div>
  <!-- container 끝 -->

  <!--
    [연결] script.js 파일을 불러옵니다 (기능 담당)
    body 맨 끝에 두는 이유: HTML이 모두 로드된 뒤에 JS가 실행되어야 하기 때문
  -->
  <script src="script.js"></script>

</body>
</html>
